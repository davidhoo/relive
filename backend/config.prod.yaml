# 生产环境配置
server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"  # 生产模式

# 数据库配置
database:
  type: "sqlite"
  path: "/app/data/relive.db"
  auto_migrate: true
  log_mode: false  # 生产环境不打印 SQL

# 照片目录
photos:
  root_path: "/app/photos"  # Docker 挂载的照片目录
  thumbnail_path: "/app/data/thumbnails"  # 缩略图存储路径（HEIC转换等）
  exclude_dirs:
    - ".sync"
    - "@eaDir"
    - "#recycle"
    - ".DS_Store"
    - "Thumbs.db"
    - ".Trashes"
  supported_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".heic"
    - ".HEIC"
    - ".JPG"
    - ".JPEG"
    - ".PNG"

# AI 配置
ai:
  provider: ""  # 默认不启用 AI，可通过配置管理页面动态配置，可选: ollama / qwen / openai / vllm / hybrid
  timeout: 120
  temperature: 0.7

  # Ollama 配置（本地/远程开源模型）
  ollama:
    endpoint: "http://host.docker.internal:11434"  # Docker 访问宿主机
    model: "llava:13b"
    temperature: 0.7
    timeout: 120

  # Qwen 配置（阿里云在线 API）
  # API Key 通过管理页面配置，存储在数据库中
  qwen:
    api_key: ""
    endpoint: "https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation"
    model: "qwen-vl-max"
    temperature: 0.7
    timeout: 60

  # OpenAI 配置（OpenAI 在线 API）
  # API Key 通过管理页面配置，存储在数据库中
  openai:
    api_key: ""
    endpoint: "https://api.openai.com/v1/chat/completions"
    model: "gpt-4-vision-preview"
    temperature: 0.7
    max_tokens: 1000
    timeout: 60

  # VLLM 配置（自部署推理服务）
  vllm:
    endpoint: "http://host.docker.internal:8000"
    model: "llava-v1.6-vicuna-13b"
    temperature: 0.7
    max_tokens: 800
    timeout: 120

  # Hybrid 混合模式配置
  hybrid:
    primary: "ollama"    # 主要 provider
    fallback: "qwen"     # 备用 provider

# 展示策略
display:
  algorithm: "on_this_day"
  fallback_days: [3, 7, 30, 365]
  avoid_repeat_days: 7

# 日志配置
logging:
  level: "info"  # 生产环境使用 info
  file: "/app/data/logs/relive.log"
  max_size: 100  # MB
  max_backups: 10
  max_age: 30  # days
  console: true

# 安全配置
security:
  jwt_Secret: "${JWT_SECRET:-relive-production-secret-change-me}"
  api_key_prefix: "sk-relive-"

# 性能配置
performance:
  max_scan_workers: 10  # 扫描照片的并发数
  max_analyze_workers: 5  # AI 分析的并发数
  cache_size: 1000  # 缓存的照片数量

# 逆地理编码配置（GPS 坐标转位置信息）
geocode:
  # provider: 可选值 - offline (离线), amap (高德), nominatim (OpenStreetMap), hybrid (混合)
  # 推荐使用 offline，因为已导入 23万+ 城市数据，无需联网
  provider: "offline"

  # 离线模式配置
  offline:
    max_distance: 100  # 最大搜索距离（公里），默认 100km

  # 高德地图配置（在线，国内精度高）
  # 需要申请 API Key: https://lbs.amap.com/
  # 注意：如需使用，通过管理页面配置
  amap:
    api_key: ""
    timeout: 10

  # OpenStreetMap Nominatim 配置（在线，免费）
  nominatim:
    endpoint: "https://nominatim.openstreetmap.org/reverse"
    timeout: 10
    # 注意：生产环境使用请遵守使用政策，建议自建 Nominatim 服务

  # 混合模式配置（优先离线，失败时回退到在线）
  hybrid:
    primary: "offline"     # 主要 provider
    fallback: "nominatim"  # 离线失败时的备用 provider
