# relive-analyzer API 模式配置
# 注意：此文件包含敏感信息，请勿提交到 Git！
server:
  endpoint: "http://localhost:8080"
  api_key: "${RELIVE_API_KEY}"
  timeout: 30

analyzer:
  workers: 2
  fetch_limit: 5
  retry_count: 3
  retry_delay: 5
  checkpoint_file: "./data/analyzer-checkpoint.db"

ai:
  provider: "vllm"
  vllm:
    endpoint: "${VLLM_ENDPOINT}"
    model: "${VLLM_MODEL}"
    temperature: 0.7
    timeout: 60

download:
  temp_dir: "./data/analyzer-temp"
  timeout: 60
  max_concurrent: 3
  retry_count: 3
  keep_temp: false

batch:
  size: 5
  flush_interval: 30
  max_retry: 3
  retry_delay: 5

logging:
  level: "debug"
  console: true
  file: "./data/logs/analyzer.log"
