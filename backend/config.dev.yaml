# 服务配置
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"  # debug / release
  external_url: "http://localhost:8080"  # 外部访问地址，用于生成照片下载链接
  static_path: ""  # 开发环境不提供静态文件（由 Vite 独立提供）

# 数据库配置
database:
  type: "sqlite"
  path: "./data/relive.db"
  auto_migrate: true
  log_mode: true  # 开发环境打印 SQL

# 照片目录
photos:
  root_path: "./data/photos"  # 开发环境使用测试照片
  thumbnail_path: "./data/thumbnails"  # 缩略图存储路径（HEIC转换等）
  exclude_dirs:
    - ".sync"
    - "@eaDir"
    - "#recycle"
    - ".DS_Store"
  supported_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".heic"

# AI 配置
ai:
  provider: ""  # 默认不启用 AI，可选: ollama / qwen / openai / vllm / hybrid
  timeout: 60
  temperature: 0.7

  # Ollama 配置（本地/远程开源模型）
  ollama:
    endpoint: "http://localhost:11434"
    model: "llava:13b"
    temperature: 0.7
    timeout: 120

  # Qwen 配置（阿里云在线 API）
  qwen:
    api_key: ""  # 需要填写真实的 API Key
    endpoint: "https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation"
    model: "qwen-vl-max"
    temperature: 0.7
    timeout: 60

  # OpenAI 配置（OpenAI 在线 API）
  openai:
    api_key: ""  # 需要填写真实的 API Key
    endpoint: "https://api.openai.com/v1/chat/completions"
    model: "gpt-4-vision-preview"
    temperature: 0.7
    max_tokens: 1000
    timeout: 60

  # VLLM 配置（自部署推理服务）
  vllm:
    endpoint: "http://localhost:8000"
    model: "llava-v1.6-vicuna-13b"
    temperature: 0.7
    max_tokens: 800
    timeout: 120
    enable_thinking: false  # 是否启用思考，默认 false

  # Hybrid 混合模式配置
  hybrid:
    primary: "ollama"    # 主要 provider
    fallback: "qwen"     # 备用 provider（当主 provider 失败时使用）

# 地理编码配置
geocode:
  provider: "offline"  # offline / amap / nominatim
  fallback: "nominatim"  # 备用提供商
  cache_enabled: true
  cache_ttl: 86400  # 缓存有效期（秒），默认 24 小时

  # 高德地图配置
  amap_api_key: ""  # 需要填写真实的 API Key（申请地址：https://lbs.amap.com/）
  amap_timeout: 10  # 超时时间（秒）

  # Nominatim (OpenStreetMap) 配置
  nominatim_endpoint: "https://nominatim.openstreetmap.org/reverse"
  nominatim_timeout: 10

  # 离线数据库配置
  offline_max_distance: 100  # 最大搜索距离（km）

# 展示策略
display:
  algorithm: "on_this_day"
  fallback_days: [3, 7, 30, 365]
  avoid_repeat_days: 7

# 日志配置
logging:
  level: "debug"
  file: "./data/logs/relive.log"
  max_size: 100  # MB
  max_backups: 10
  max_age: 30  # days
  console: true  # 输出到控制台

# 安全配置
security:
  jwt_Secret: "dev-secret-change-in-production"
  api_key_prefix: "sk-relive-"
