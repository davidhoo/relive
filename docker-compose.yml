version: '3.8'

services:
  # Relive 后端服务
  relive-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relive-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 配置文件
      - ./backend/config.prod.yaml:/app/config.yaml:ro
      # 数据目录（数据库、日志）
      - ./data/backend:/app/data
      # =============================================================================
      # 照片目录挂载（Docker 特有配置）
      # =============================================================================
      # 注意：直接运行 Go 程序时不需要以下配置，系统启动后可在 Web 界面添加扫描路径
      #
      # 使用方法：
      # 1. 修改下方的宿主机路径（冒号左边）为你实际的照片目录
      # 2. 容器内路径（冒号右边）保持 /app/photos 不变
      # 3. 在 Web 界面中添加扫描路径时使用容器内路径：/app/photos
      #
      # 示例：
      # - /Users/david/Pictures:/app/photos:ro
      # - /Volumes/ExternalDrive/Photos:/app/photos:ro
      # =============================================================================
      # - ./data/photos:/app/photos:ro
      - /Users/david/Downloads/2025:/app/photos/iphone2025:ro
      - /Users/david/SynologyDrive/亚太锦标赛韩国-仁川站:/app/photos/亚太锦标赛韩国-仁川站:ro
      # 额外的照片路径挂载（可选）
      # 如需使用，取消注释并修改路径：
      # - /path/to/extra/photos1:/app/photos_extra1:ro
      # - /path/to/extra/photos2:/app/photos_extra2:ro
      # - /path/to/extra/photos3:/app/photos_extra3:ro
    environment:
      - TZ=Asia/Shanghai
      # AI Provider API Keys（如果使用）
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - relive-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/system/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Relive 前端服务
  relive-frontend:
    image: nginx:alpine
    container_name: relive-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      # 前端构建产物
      - ./frontend/dist:/usr/share/nginx/html:ro
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - relive-backend
    networks:
      - relive-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  relive-network:
    driver: bridge

volumes:
  # 如果需要持久化数据，可以使用 named volumes
  relive-data:
