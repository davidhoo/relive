; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
;   Hardware: ESP32-S3-DevKitC-1 N16R8
;   - Flash: 16MB
;   - PSRAM: 8MB (Octal, 120MB/s)
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ============ 串口监控配置 ============
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ============ 上传配置 ============
; 自动检测上传端口（Windows/Linux/Mac）
; 如有问题可取消注释指定端口: upload_port = /dev/ttyUSB0 或 COM3
; upload_port = /dev/ttyUSB0
upload_speed = 921600

; ============ 分区表配置 ============
; 16MB Flash 使用 large partition table
board_build.partitions = default_16MB.csv

; ============ Flash 模式 ============
; QIO 模式，80MHz（ESP32-S3 支持的最大速度）
board_build.flash_mode = qio
board_build.f_flash = 80000000L

; ============ PSRAM 配置 ============
; 启用 8MB Octal PSRAM
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DLOG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; PSRAM 配置
    -DCONFIG_SPIRAM_USE=1
    -DCONFIG_SPIRAM_TYPE=1
    -DCONFIG_SPIRAM_SIZE=8388608
    ; 启用 PSRAM 用于 malloc
    -DCONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=16384

; ============ 库依赖 ============
lib_deps =
    ; WiFi 和 HTTP 客户端（Arduino 内置）
    ; mbedTLS（ESP32 内置）

; ============ 文件系统 ============
board_build.filesystem = littlefs

; ============ 调试配置（可选） ============
; 启用 GDB 调试（如需 JTAG 调试）
; debug_tool = esp-builtin
; debug_init_break = tbreak setup
